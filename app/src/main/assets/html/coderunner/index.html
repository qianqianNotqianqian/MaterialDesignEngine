<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>运行器</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <style>
        @media (prefers-color-scheme: dark) {
          body {
            font-family: Arial, sans-serif;
            background-color: #000000;
          }
          form {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            padding: 1rem;
            /* background-color: #FFFFFF; */
            background-color: #303030;
            border-radius: 5px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.16);
          }
          h1 {
            text-align: center;
            font-size: 2rem;
            color: #ffffff;
            margin-top: 1rem;
          }
          label {
            font-weight: bold;
            color: #ffffff;
            margin-right: 0.5rem;
          }
          #output {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #303030;
            border-radius: 5px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.16);
          }
          textarea {
            padding: 0.5rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            border-radius: 5px;
            background-color: #303030;
            border: 1px solid #cccccc;
            width: 90%;
            color: #ffffff;
            max-width: 300px;
            height: 120px;
            resize: vertical;
          }
        }

        @media (prefers-color-scheme: light) {
          body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
          }
          form {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            padding: 1rem;
            /* background-color: #FFFFFF; */
            background-color: #f0f0f0;
            border-radius: 5px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.16);
          }
          h1 {
            text-align: center;
            font-size: 2rem;
            color: #000000;
            margin-top: 1rem;
          }
          label {
            font-weight: bold;
            color: #000000;
            margin-right: 0.5rem;
          }
          #output {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #f0f0f0;
            border-radius: 5px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.16);
          }
          textarea {
            padding: 0.5rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            border-radius: 5px;
            background-color: #f0f0f0;
            border: 1px solid #cccccc;
            width: 90%;
            color: #000000;
            max-width: 300px;
            height: 120px;
            resize: vertical;
          }
        }

        button {
          padding: 0.5rem 1rem;
          margin-top: 0.5rem;
          margin-bottom: 0.5rem;
          border-radius: 5px;
          background-color: #1e90ff;
          color: #ffffff;
          border: none;
          cursor: pointer;
        }

        button:hover {
          background-color: #007acc;
        }

    </style>
</head>
<body>
<h1>html运行器</h1>
<form id="generator-form">
    <label for="input1">输入 HTML 代码:</label>
    <textarea id="input1" required></textarea>
    <button type="submit">运行代码</button>
</form>
<div id="output">
    <label id="output1">代码运行结果:</label>
</div>
<script>
    const form = document.querySelector("#generator-form");
    const output = document.querySelector("#output");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const input1Value = document.querySelector("#input1").value;

      try {
        output.innerHTML = input1Value;
        output.style.display = "block";
      } catch (error) {
        output.innerHTML = `Error: ${error.message}`;
        output.style.display = "block";
      }
    });

</script>
</body>
</html>
