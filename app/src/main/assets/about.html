<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
      name="viewport"
    />
    <style>
      @media (prefers-color-scheme: dark) {
        body {
          color: #404040;
          background-color: black;
        }
        a {
          color: #007bff;
        }
        a:hover {
          color: #0064cf;
          text-decoration: none;
        }
        td,
        th {
          border: 1px solid #333;
          padding: 3px 10px;
        }
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
          color: #fff;
        }
      }
      @media (prefers-color-scheme: light) {
        body {
          color: #737373;
          background-color: white;
        }
        a {
          color: #0069d6;
        }
        a:hover {
          color: #0050a3;
          text-decoration: none;
        }
        td,
        th {
          border: 1px solid #ddd;
          padding: 3px 10px;
        }
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
          color: #000;
        }
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      p,
      blockquote {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Helvetica Neue", Helvetica, "Hiragino Sans GB", Arial,
          sans-serif;
        font-size: 13px;
        line-height: 18px;
        margin: 10px 13px 10px 13px;
      }
      table {
        margin: 10px 0 15px 0;
        border-collapse: collapse;
      }

      th {
        padding: 5px 10px;
      }

      a img {
        border: none;
      }
      p {
        font-size: 18px;
        margin-bottom: 9px;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        line-height: 36px;
      }
      h1 {
        margin-bottom: 18px;
        font-size: 30px;
      }
      h2 {
        font-size: 24px;
      }
      h3 {
        font-size: 18px;
      }
      h4 {
        font-size: 24px;
      }
      h5 {
        font-size: 14px;
      }
      h6 {
        font-size: 13px;
      }
      hr {
        margin: 0 0 19px;
        border: 0;
        border-bottom: 1px solid #ccc;
      }
      blockquote {
        padding: 13px 13px 21px 15px;
        margin-bottom: 18px;
        font-family: georgia, serif;
        font-style: italic;
      }
      blockquote:before {
        content: "\201C";
        font-size: 40px;
        margin-left: -10px;
        font-family: georgia, serif;
        color: #eee;
      }
      blockquote p {
        font-size: 14px;
        font-weight: 300;
        line-height: 18px;
        margin-bottom: 0;
        font-style: italic;
      }
      code,
      pre {
        font-family: Monaco, Andale Mono, Courier New, monospace;
      }
      code {
        background-color: #fee9cc;
        color: rgba(0, 0, 0, 0.75);
        padding: 1px 3px;
        font-size: 12px;
        -webkit-border-radius: 3px;
        -moz-border-radius: 3px;
        border-radius: 3px;
      }
      pre {
        display: block;
        padding: 14px;
        margin: 0 0 18px;
        line-height: 16px;
        font-size: 11px;
        border: 1px solid #d9d9d9;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      pre code {
        background-color: #fff;
        color: #737373;
        font-size: 11px;
        padding: 0;
      }
      sup {
        font-size: 0.83em;
        vertical-align: super;
        line-height: 0;
      }
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @media screen and (min-width: 914px) {
        body {
          width: 854px;
          margin: 10px auto;
        }
      }
      @media print {
        body,
        code,
        pre code,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
          color: black;
        }
        table,
        pre {
          page-break-inside: avoid;
        }
      }
    </style>
    <title>关注我吧</title>
    <script>
      // JavaScript function to get background color of the body element
      function getBackgroundColor() {
        var body = document.body;
        var backgroundColor = window
          .getComputedStyle(body, null)
          .getPropertyValue("background-color");
        return backgroundColor;
      }

      // Function to send background color to Android app
      function sendBackgroundColorToApp(color) {
        // Check if Android app is available
        if (window.AndroidAppInterface) {
          // Call Android app interface function to send color
          window.AndroidAppInterface.onBackgroundColorReceived(color);
        }
      }
    </script>
  </head>
  <body>
    <h4>关注我吧</h4>

    <p>
      <a href="https://github.com/sunfusheng/MarqueeView"
        >项目开源地址：https://github.com/sunfusheng/MarqueeView</a
      >
    </p>

    <p>
      <a href="https://github.com/sunfusheng"
        >GitHub主页：https://github.com/sunfusheng</a
      >
    </p>

    <p>
      <a href="http://www.jianshu.com/users/88509e7e2ed1/latest_articles"
        >简书主页</a
      >
    </p>

    <p><a href="http://sunfusheng.com/">个人博客</a></p>

    <p><a href="http://weibo.com/u/3852192525">新浪微博</a></p>

    <script>
      // Call the function to get background color and send it to Android app
      var backgroundColor = getBackgroundColor();
      sendBackgroundColorToApp(backgroundColor);
    </script>
  </body>
</html>
